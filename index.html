<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Engine Studio</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SVG Engine Web Component -->
  <script src="https://unpkg.com/@codefrydev/svg-engine/dist/wc.iife.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #09090b; /* Tailwind zinc-950 */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* Ensure the engine fills its container */
    codefrydev-svg-engine {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Minimalist select dropdown */
    select {
      appearance: none;
      -webkit-appearance: none;
    }
    select option {
      background: #18181b;
      color: #e4e4e7;
    }
  </style>
</head>

<body class="bg-zinc-950 h-screen w-screen overflow-hidden relative text-zinc-300">

  <!-- Main Canvas filling the entire screen -->
  <codefrydev-svg-engine
    id="editor"
    preset="mechanics"
    class="absolute inset-0 z-0"
  ></codefrydev-svg-engine>

  <!-- Ultra-Minimal Floating Toolbar -->
  <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-1 bg-zinc-900/80 backdrop-blur-xl border border-white/10 p-1.5 rounded-full shadow-2xl z-50">
    
    <!-- Preset Selector -->
    <div class="relative flex items-center group pl-3 pr-2">
      <svg class="w-4 h-4 text-zinc-400 absolute left-3 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      <select
        id="presetSelect"
        class="bg-transparent text-zinc-300 text-sm font-medium pl-6 pr-6 py-2 outline-none cursor-pointer hover:text-zinc-100 transition-colors w-32"
      >
        <option value="mechanics">Mechanics</option>
        <option value="circuit">Circuit</option>
        <option value="thermo">Thermo</option>
        <option value="magnetism">Magnetism</option>
        <option value="light">Light</option>
        <option value="waveOscillation">Wave</option>
        <option value="rotation">Rotation</option>
        <option value="graph">Graph</option>
        <option value="electrostatics">Electrostatics</option>
        <option value="chemistry">Chemistry</option>
      </select>
      <svg class="w-3 h-3 text-zinc-500 absolute right-2 pointer-events-none group-hover:text-zinc-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
    </div>

    <div class="h-5 w-px bg-white/10 mx-1"></div>

    <!-- Icon Buttons -->
    <button id="loadBtn" title="Load" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded-full transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
    </button>
    <button id="saveBtn" title="Save" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded-full transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
    </button>
    <button id="exportBtn" title="Export JSON" class="w-9 h-9 flex items-center justify-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 rounded-full transition-all mr-0.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
    </button>
  </div>

  <!-- Modern Centered Pill Toast (Moved to Top) -->
  <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-zinc-800/95 backdrop-blur text-zinc-100 px-4 py-2.5 rounded-full shadow-lg border border-white/10 transition-all duration-300 transform -translate-y-10 opacity-0 z-50 pointer-events-none flex items-center gap-2.5 text-sm font-medium">
    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span id="toastMsg">Notification</span>
  </div>

  <script>
  // DOM Elements
  const editor = document.getElementById("editor");
  const presetSelect = document.getElementById("presetSelect");
  const toast = document.getElementById("toast");
  const toastMsg = document.getElementById("toastMsg");

  // Custom Toast Notification System
  let toastTimeout;
  function showToast(message, isError = false) {
    toastMsg.textContent = message;
    
    // Adjust icon/colors based on error state
    const svg = toast.querySelector('svg');
    if (isError) {
      svg.classList.replace('text-emerald-400', 'text-red-400');
      svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
    } else {
      svg.classList.replace('text-red-400', 'text-emerald-400');
      svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
    }

    // Show toast (animating from the top)
    toast.classList.remove("-translate-y-10", "opacity-0");
    
    // Hide toast after 3 seconds
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.add("-translate-y-10", "opacity-0");
    }, 3000);
  }

  /* -------------------------------- */
  /* Initial Diagram Data             */
  /* -------------------------------- */
  const initialData = [
    {
      id: 1,
      type: "block",
      x1: 100,
      y1: 200,
      x2: 220,
      y2: 280,
      label: "m"
    }
  ];

  // Initialize the editor with starting data once the element is ready
  // Using a slight timeout or listening for component mount is sometimes 
  // necessary for Web Components, but inline script often executes fine.
  customElements.whenDefined('codefrydev-svg-engine').then(() => {
    editor.setData(initialData);
  });

  /* -------------------------------- */
  /* Export JSON Handler              */
  /* -------------------------------- */
  document.getElementById("exportBtn").addEventListener("click", () => {
    try {
      const data = editor.getData();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "diagram-export.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast("Diagram exported successfully!");
    } catch (err) {
      showToast("Failed to export diagram.", true);
      console.error(err);
    }
  });

  /* -------------------------------- */
  /* Save to LocalStorage             */
  /* -------------------------------- */
  document.getElementById("saveBtn").addEventListener("click", () => {
    try {
      const data = editor.getData();
      localStorage.setItem("svg-engine-diagram", JSON.stringify(data));
      showToast("Diagram saved to local storage!");
    } catch (err) {
      showToast("Failed to save diagram.", true);
      console.error(err);
    }
  });

  /* -------------------------------- */
  /* Load from LocalStorage           */
  /* -------------------------------- */
  document.getElementById("loadBtn").addEventListener("click", () => {
    try {
      const raw = localStorage.getItem("svg-engine-diagram");
      if (!raw) {
        showToast("No saved diagram found.", true);
        return;
      }
      const data = JSON.parse(raw);
      editor.setData(data);
      showToast("Diagram loaded successfully!");
    } catch (err) {
      showToast("Failed to load diagram.", true);
      console.error(err);
    }
  });

  /* -------------------------------- */
  /* Preset Change Handler            */
  /* -------------------------------- */
  presetSelect.addEventListener("change", (e) => {
    const preset = e.target.value;
    editor.setAttribute("preset", preset);
    editor.clear();
    showToast(`Switched to ${preset} mode.`);
  });

</script>

</body>
</html>
